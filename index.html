<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Vitrine</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 1/1;
      object-fit: cover;
    }
    .info {
      padding: 12px;
    }
    .name {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .price {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .btn {
      display: block;
      text-align: center;
      text-decoration: none;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Catálogo Vitrine</h1>  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/400?text=Adizero" alt="Tênis" />
      <div class="info">
        <div class="name">Adizero Adios Pro 3</div>
        <div class="price">R$ 220</div>
        <a class="btn" href="https://wa.me/5531992094178?text=Olá%2C%20tenho%20interesse%20no%20Adizero">WhatsApp</a>
      </div>
    </div><div class="card">
  <img src="https://via.placeholder.com/400?text=Ultraboost" alt="Tênis" />
  <div class="info">
    <div class="name">Ultraboost Light</div>
    <div class="price">R$ 290</div>
    <a class="btn" href="https://wa.me/5531992094178?text=Olá%2C%20tenho%20interesse%20no%20Ultraboost">WhatsApp</a>
  </div>
</div>

  </div>
</body>
</html>
